<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Emergencia Barcelona</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #c62828;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .legend div {
      margin-bottom: 5px;
    }

    .red { color: red; }
  </style>
</head>
<body>

<header>
  Mapa de Zonas Conflictivas - Botones de Emergencia
</header>

<div id="map"></div>

<div class="legend">
  <div><span class="red">●</span> Zona conflictiva</div>
</div>

<script>
  function initMap() {
    const barcelona = { lat: 41.3851, lng: 2.1734 };

    // Aquí definimos el mapa base (fondo)
    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13,
      center: barcelona,
      mapTypeId: "roadmap" // opciones: roadmap, satellite, hybrid, terrain
    });

    const zonasConflictivas = [
      { lat: 41.3809, lng: 2.1735, title: "Raval" },
      { lat: 41.3927, lng: 2.1630, title: "Eixample" },
      { lat: 41.4036, lng: 2.1744, title: "Sagrada Familia" }
    ];

    zonasConflictivas.forEach(zona => {
      const marker = new google.maps.Marker({
        position: zona,
        map: map,
        title: zona.title,
        icon: "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
      });

      const info = new google.maps.InfoWindow({
        content: `<b>${zona.title}</b><br>Botón de emergencia instalado`
      });

      marker.addListener("click", () => {
        info.open(map, marker);
      });
    });
  }
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap">
</script>

</body>
</html>
